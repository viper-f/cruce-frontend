<div id="pun-main" class="main">
  <div class="main-header">
    <h1 i18n="@@settings.title">Settings</h1>
  </div>
  <div class="main-content">
    <form id="settings-form" class="container" (submit)="onSubmit($event)">
      <fieldset>
        <legend i18n="@@settings.profile">Profile</legend>
        <div class="fs-box avatar-setting">
          <div class="current-avatar">
            <img [src]="avatarUrl" alt="Current Avatar">
          </div>
          <div class="avatar-input">
            <label i18n="@@settings.avatarUrl">Avatar URL</label>
            <app-image-field [name]="'avatar_url'" [fieldValue]="avatarUrl" [showFieldName]="false"></app-image-field>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend i18n="@@settings.localization">Localization</legend>
        <div class="fs-box">
          <p class="inputfield">
            <label for="language" i18n="@@settings.language">Language</label><br />
            <span class="input">
              <select id="language" name="language" [(ngModel)]="language">
                <option value="en-US">English</option>
                <option value="ru-RU">Russian</option>
              </select>
            </span>
          </p>
          <p class="inputfield">
            <label for="timezone" i18n="@@settings.timezone">Timezone</label><br />
            <span class="input">
              <select id="timezone" name="timezone" [(ngModel)]="timezone">
                @for (tz of timezones; track tz.value) {
                  <option [value]="tz.value">{{ tz.label }}</option>
                }
              </select>
            </span>
          </p>
          <p class="inputfield">
            <label for="interface_design" i18n="@@settings.design">Design</label><br />
            <span class="input">
              <select id="interface_design" name="interface_design" [(ngModel)]="interfaceDesign">
                <option [ngValue]="null" i18n="@@settings.designDefault">Default</option>
                @for (v of designVariations(); track v.id) {
                  <option [ngValue]="v.class_name">{{ v.name }}</option>
                }
              </select>
            </span>
          </p>
          <p class="inputfield">
            <label for="font_size">Font Size</label><br />
            <span class="input">
              <select id="font_size" name="font_size" [(ngModel)]="fontSize">
                @for (size of fontSizes; track size.value) {
                  <option [ngValue]="size.value">{{ size.label }}</option>
                }
              </select>
            </span>
          </p>
        </div>
      </fieldset>

      <fieldset>
        <legend i18n="@@settings.notifications">Notifications</legend>
        <div class="fs-box">
          <p class="inputfield">
            <label>
              <input type="checkbox" [(ngModel)]="disableSound" name="disable_sound" />
              <ng-container i18n="@@settings.disableSound">Disable sound notifications</ng-container>
            </label>
          </p>
        </div>
      </fieldset>

      <fieldset>
        <legend i18n="@@settings.changePassword">Change Password</legend>
        <div class="fs-box">
          <p class="inputfield">
            <label for="old_password" i18n="@@settings.oldPassword">Old Password</label><br />
            <span class="input"><input id="old_password" type="password" name="old_password" [(ngModel)]="oldPassword" /></span>
          </p>
          <p class="inputfield">
            <label for="new_password" i18n="@@settings.newPassword">New Password</label><br />
            <span class="input"><input id="new_password" type="password" name="new_password" [(ngModel)]="newPassword" /></span>
          </p>
          <p class="inputfield">
            <label for="confirm_password" i18n="@@settings.confirmPassword">Confirm New Password</label><br />
            <span class="input"><input id="confirm_password" type="password" name="confirm_password" [(ngModel)]="confirmPassword" /></span>
          </p>
        </div>
      </fieldset>

      <p class="formsubmit">
        <button type="submit" [class]="'btn-save btn-save--' + saveState()" [disabled]="saveState() === 'loading'">
          @switch (saveState()) {
            @case ('loading') { <span class="spinner"></span> }
            @case ('success') { <span i18n="@@common.saved">Saved</span> }
            @case ('error') { <span i18n="@@common.saveFailed">Failed</span> }
            @default { <span i18n="@@settings.save">Save Settings</span> }
          }
        </button>
      </p>
    </form>
  </div>
</div>
