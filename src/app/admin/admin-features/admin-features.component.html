<div class="features-container">
  <h2 i18n="@@adminFeatures.title">Features</h2>

  <table cellspacing="0">
    <thead>
      <tr>
        <th i18n="@@adminFeatures.name">Name</th>
        <th i18n="@@adminFeatures.description">Description</th>
        <th i18n="@@adminFeatures.enabled">Enabled</th>
        <th i18n="@@adminFeatures.settings">Settings</th>
      </tr>
    </thead>
    <tbody>
      @for (feature of features(); track feature.key) {
        <tr>
          <td>{{ feature.name }}</td>
          <td>{{ feature.description }}</td>
          <td>
            <input type="checkbox" [checked]="feature.is_active" (change)="toggle(feature.key)" />
          </td>
          <td>
            <a [routerLink]="['/admin/features', feature.key]" i18n="@@adminFeatures.settingsLink">Settings</a>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
