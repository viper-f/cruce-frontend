<div class="reactions-container">
  <h2 i18n="@@admin.reactions">Reactions</h2>

  <section class="reactions-section">
    <table class="data-table">
      <thead>
        <tr>
          <th i18n="@@admin.reactions.image">Image</th>
          <th i18n="@@admin.reactions.status">Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (reaction of reactions(); track reaction.id) {
          <tr>
            <td><img [src]="'/reactions/' + reaction.url" class="reaction-preview" alt="" /></td>
            <td>
              @if (reaction.is_active) {
                <span class="status-badge status-badge--active" i18n="@@common.statusActive">Active</span>
              } @else {
                <span class="status-badge status-badge--inactive" i18n="@@common.statusInactive">Inactive</span>
              }
            </td>
            <td>
              <button
                type="button"
                class="btn-toggle"
                [class.btn-toggle--deactivate]="reaction.is_active"
                [class.btn-toggle--activate]="!reaction.is_active"
                (click)="toggle(reaction)"
              >
                @if (reaction.is_active) {
                  <span i18n="@@common.deactivate">Deactivate</span>
                } @else {
                  <span i18n="@@common.activate">Activate</span>
                }
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </section>

  <section class="reactions-section">
    <h3 i18n="@@admin.reactions.upload">Upload new reaction</h3>
    <div class="upload-row">
      <label class="upload-label">
        <input
          type="file"
          accept="image/*"
          class="file-input"
          (change)="onFileSelected($event)"
          [disabled]="uploadState() === 'loading'"
        />
        <span class="btn-upload" [class]="'btn-upload--' + uploadState()">
          @switch (uploadState()) {
            @case ('loading') { <span class="spinner"></span> }
            @case ('success') { <span i18n="@@common.uploaded">Uploaded</span> }
            @case ('error') { <span i18n="@@common.uploadFailed">Failed</span> }
            @default { <span i18n="@@admin.reactions.uploadButton">Upload reaction</span> }
          }
        </span>
      </label>
    </div>
  </section>
</div>
