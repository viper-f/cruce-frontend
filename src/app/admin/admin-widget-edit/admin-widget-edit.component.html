<h2>
  @if (widgetId) {
    <ng-container i18n="@@admin.widgetEdit.titleEdit">Edit Widget</ng-container>
  } @else {
    <ng-container i18n="@@admin.widgetEdit.titleCreate">Create Widget</ng-container>
  }
</h2>

<div class="widget-form">
  <div class="field">
    <label for="widget-name" i18n="@@admin.widgetEdit.name">Name</label>
    <input id="widget-name" type="text" [(ngModel)]="name" />
  </div>

  <div class="field">
    <label for="widget-type" i18n="@@admin.widgetEdit.type">Template</label>
    <select id="widget-type" [(ngModel)]="selectedTypeId" (ngModelChange)="onTypeChange()" [disabled]="!!widgetId">
      <option [ngValue]="null" disabled i18n="@@admin.widgetEdit.selectType">— Select template —</option>
      @for (type of widgetTypes(); track type.id) {
        <option [ngValue]="type.id">{{ type.name }}</option>
      }
    </select>
  </div>

  @if (configFields().length > 0) {
    <fieldset class="config-fields">
      <legend i18n="@@admin.widgetEdit.config">Configuration</legend>

      @for (field of configFields(); track field.key) {
        <div class="field">
          <label [for]="'cfg-' + field.key">{{ field.key }}</label>
          @switch (field.type) {
            @case ('text') {
              <textarea [id]="'cfg-' + field.key" [(ngModel)]="field.value" rows="4"></textarea>
            }
            @case ('int') {
              <input [id]="'cfg-' + field.key" type="number" [(ngModel)]="field.value" />
            }
            @default {
              <input [id]="'cfg-' + field.key" type="text" [(ngModel)]="field.value" />
            }
          }
        </div>
      }
    </fieldset>
  }

  <div class="form-actions">
    <button
      type="button"
      [class]="'btn-save btn-save--' + saveState()"
      [disabled]="saveState() === 'loading' || !selectedTypeId"
      (click)="save()"
    >
      @switch (saveState()) {
        @case ('loading') { <span class="spinner"></span> }
        @case ('success') { <span i18n="@@common.saved">Saved</span> }
        @case ('error') { <span i18n="@@common.saveFailed">Failed</span> }
        @default {
          @if (widgetId) {
            <span i18n="@@common.update">Update</span>
          } @else {
            <span i18n="@@common.create">Create</span>
          }
        }
      }
    </button>

    @if (widgetId) {
      <button
        type="button"
        [class]="'btn-delete btn-delete--' + deleteState()"
        [disabled]="deleteState() === 'loading'"
        (click)="delete()"
      >
        @switch (deleteState()) {
          @case ('loading') { <span class="spinner"></span> }
          @case ('error') { <span i18n="@@common.saveFailed">Failed</span> }
          @default { <span i18n="@@common.delete">Delete</span> }
        }
      </button>
    }
  </div>
</div>
