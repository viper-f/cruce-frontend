<div class="toast-overlay">
  @for (notification of notifications; track notification.id) {
    <div class="toast-item">
      <div class="toast-side-accent"></div>
      <div class="toast-main">
        <div class="toast-header">
          <span class="toast-label">{{ notification.title }}</span>
          <span class="toast-time">now</span>
        </div>
        <div class="toast-content">
          <span class="toast-sender">{{ notification.type }}:</span>
          @if (notification.type === 'mention' && notification.mention) {
            <span class="toast-text">{{ notification.message }}
              <a [routerLink]="['/viewtopic', notification.mention.topic_id]" (click)="remove(notification.id)">{{ notification.mention.topic_name }}</a>
            </span>
          } @else {
            <span class="toast-text">{{ notification.message }}</span>
          }
        </div>
      </div>
      <button class="toast-close" (click)="remove(notification.id)">&times;</button>
    </div>
  }
</div>
